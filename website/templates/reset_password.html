{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height:60vh;">
  <div class="card glass-card-ui p-5" style="max-width: 480px; width:100%; border-radius: 1.5rem; box-shadow: 0 8px 32px rgba(112,146,190,0.18); border: 1.5px solid #C1D3FE;">
    <div class="text-center mb-4">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#7092BE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-key" style="background:rgba(193,211,254,0.18);border-radius:50%;padding:12px;">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 9.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
      </svg>
    </div>
    <div class="text-center mb-3">
      <h3 class="mb-0" style="color:#7092BE;font-family:'Manrope','Inter',Arial,sans-serif;font-weight:700;">Reset Your Password</h3>
    </div>
    <p class="text-center mb-4" style="color:#4A5A7A;font-size:1.15rem;">Enter your new password below to complete the reset process.</p>
    
    <form method="POST" class="d-flex flex-column">
      <input type="hidden" name="token" value="{{ token }}">
      
      <div class="form-group mb-4">
        <label for="password1" style="font-size: 1.1rem; color: #7092BE;">New Password</label>
        <input type="password" class="form-control" id="password1" name="password1" required style="font-size: 1.1rem; border-radius: 0.7rem;" placeholder="Enter new password" minlength="7">
        <small class="form-text text-muted">Password must be at least 7 characters long</small>
      </div>
      
      <div class="form-group mb-4">
        <label for="password2" style="font-size: 1.1rem; color: #7092BE;">Confirm New Password</label>
        <input type="password" class="form-control" id="password2" name="password2" required style="font-size: 1.1rem; border-radius: 0.7rem;" placeholder="Confirm new password" minlength="7">
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg mb-3" style="border-radius: 0.8em; font-size: 1.1rem; background: linear-gradient(135deg,#C1D3FE,#7092BE); color: #fff; border: none; box-shadow: 0 2px 8px #C1D3FE;">
        <i class="fa fa-save mr-2"></i>Reset Password
      </button>
      
      <div class="text-center">
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none;">
          <i class="fa fa-arrow-left mr-1"></i>Back to Login
        </a>
      </div>
    </form>
  </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;
    
    if (password1 !== password2) {
        e.preventDefault();
        alert('Passwords do not match!');
        document.getElementById('password2').focus();
        return false;
    }
    
    if (password1.length < 7) {
        e.preventDefault();
        alert('Password must be at least 7 characters long!');
        document.getElementById('password1').focus();
        return false;
    }
});
</script>
{% endblock %}

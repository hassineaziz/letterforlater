{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-primary-light/20 rounded-full p-4 mx-auto mb-4 flex items-center justify-center shadow-lg border-2 border-primary-light">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 9.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-primary mb-2">Reset Your Password</h1>
                <p class="text-gray-600">Enter your new password below to complete the reset process.</p>
            </div>
            
            <form method="POST" class="space-y-6">
                <!-- CSRF Token -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="hidden" name="token" value="{{ token }}">
                
                <div>
                    <label for="password1" class="block text-lg font-semibold text-primary mb-2">New Password</label>
                    <input type="password" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg" 
                           id="password1" 
                           name="password1" 
                           required 
                           placeholder="Enter new password" 
                           minlength="7">
                    <p class="text-sm text-gray-500 mt-1">Password must be at least 7 characters long</p>
                </div>
                
                <div>
                    <label for="password2" class="block text-lg font-semibold text-primary mb-2">Confirm New Password</label>
                    <input type="password" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg" 
                           id="password2" 
                           name="password2" 
                           required 
                           placeholder="Confirm new password" 
                           minlength="7">
                </div>
                
                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg text-lg transition-colors">
                    <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    Reset Password
                </button>
                
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" 
                       class="text-gray-600 hover:text-primary transition-colors font-medium inline-flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;
    
    if (password1 !== password2) {
        e.preventDefault();
        showNotificationToast('❌ Passwords do not match!', 'error');
        document.getElementById('password2').focus();
        return false;
    }
    
    if (password1.length < 7) {
        e.preventDefault();
        showNotificationToast('❌ Password must be at least 7 characters long!', 'error');
        document.getElementById('password1').focus();
        return false;
    }
});
</script>

{% endblock %}

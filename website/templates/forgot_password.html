{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height:60vh;">
  <div class="card glass-card-ui p-5" style="max-width: 480px; width:100%; border-radius: 1.5rem; box-shadow: 0 8px 32px rgba(112,146,190,0.18); border: 1.5px solid #C1D3FE;">
    <div class="text-center mb-4">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#7092BE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-lock" style="background:rgba(193,211,254,0.18);border-radius:50%;padding:12px;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <circle cx="12" cy="16" r="1"></circle>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <div class="text-center mb-3">
      <h3 class="mb-0" style="color:#7092BE;font-family:'Manrope','Inter',Arial,sans-serif;font-weight:700;">Forgot Your Password?</h3>
    </div>
    <p class="text-center mb-4" style="color:#4A5A7A;font-size:1.15rem;">No worries! Enter your email address and we'll send you a link to reset your password.</p>
    
    <form method="POST" class="d-flex flex-column">
      <div class="form-group mb-4">
        <label for="email" style="font-size: 1.1rem; color: #7092BE;">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required style="font-size: 1.1rem; border-radius: 0.7rem;" placeholder="Enter your email address">
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg mb-3" style="border-radius: 0.8em; font-size: 1.1rem; background: linear-gradient(135deg,#C1D3FE,#7092BE); color: #fff; border: none; box-shadow: 0 2px 8px #C1D3FE;">
        <i class="fa fa-paper-plane mr-2"></i>Send Reset Link
      </button>
      
      <div class="text-center">
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none;">
          <i class="fa fa-arrow-left mr-1"></i>Back to Login
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

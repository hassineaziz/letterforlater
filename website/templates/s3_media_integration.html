<!-- S3 Media Upload Integration for Add Letter Template -->
<!-- Include this script in your add_letter.html template -->

<script src="{{ url_for('static', filename='js/s3-media-handler.js') }}"></script>

<script>
    // S3 File upload handler for letters
    let uploadedFiles = [];

    function handleFileUpload(input) {
        const files = Array.from(input.files);
        const mediaItems = document.getElementById('mediaItems');

        console.log('File upload triggered, files count:', files.length);

        files.forEach(file => {
            console.log('Processing file:', file.name, file.type, file.size);

            // Validate file before upload
            const validation = MediaUtils.validateFile(file);
            if (!validation.valid) {
                showNotificationToast(`❌ Invalid file ${file.name}: ${validation.errors.join(', ')}`, 'error');
                return;
            }

            // Upload file to S3
            uploadFileToS3(file, validation.fileType);
        });
    }

    function uploadFileToS3(file, mediaType) {
        // Show loading state
        const loadingId = 'loading_' + Date.now();
        const loadingItem = document.createElement('div');
        loadingItem.id = loadingId;
        loadingItem.className = 'bg-yellow-50 rounded-lg p-4 border border-yellow-200 shadow-sm';
        loadingItem.innerHTML = `
        <div class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-yellow-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-yellow-800">Uploading ${file.name} to S3...</span>
        </div>
    `;

        const mediaItems = document.getElementById('mediaItems');
        mediaItems.appendChild(loadingItem);

        // Upload to S3 using the S3MediaUploader
        s3MediaUploader.uploadFile(file, mediaType)
            .then(result => {
                // Remove loading item
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) {
                    loadingElement.remove();
                }

                if (result.success) {
                    // Add to uploaded files list
                    uploadedFiles.push(result);
                    
                    // Create success item
                    const successItem = createMediaItem(result, file);
                    mediaItems.appendChild(successItem);
                    
                    console.log('✅ File uploaded successfully:', result);
                } else {
                    // Show error
                    const errorItem = document.createElement('div');
                    errorItem.className = 'bg-red-50 rounded-lg p-4 border border-red-200 shadow-sm';
                    errorItem.innerHTML = `
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-red-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span class="text-red-800">Failed to upload ${file.name}: ${result.error}</span>
                        </div>
                    `;
                    mediaItems.appendChild(errorItem);
                    
                    console.error('❌ Upload failed:', result.error);
                }
            })
            .catch(error => {
                // Remove loading item
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) {
                    loadingElement.remove();
                }

                // Show error
                const errorItem = document.createElement('div');
                errorItem.className = 'bg-red-50 rounded-lg p-4 border border-red-200 shadow-sm';
                errorItem.innerHTML = `
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-red-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-red-800">Failed to upload ${file.name}: ${error.message}</span>
                    </div>
                `;
                mediaItems.appendChild(errorItem);
                
                console.error('❌ Upload error:', error);
            });
    }

    function createMediaItem(uploadResult, originalFile) {
        const item = document.createElement('div');
        item.className = 'bg-white border border-gray-200 rounded-lg p-4 shadow-sm';
        item.dataset.mediaId = uploadResult.media_id;
        
        const fileSize = MediaUtils.formatFileSize(uploadResult.file_size);
        const fileTypeIcon = getFileTypeIcon(uploadResult.file_type);
        
        item.innerHTML = `
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    ${fileTypeIcon}
                    <div>
                        <p class="text-sm font-medium text-gray-900">${uploadResult.file_name}</p>
                        <p class="text-xs text-gray-500">${fileSize} • ${uploadResult.file_type}</p>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="previewMedia(${uploadResult.media_id}, '${uploadResult.file_type}')" 
                            class="text-blue-600 hover:text-blue-800 text-sm">
                        Preview
                    </button>
                    <button onclick="removeMedia(${uploadResult.media_id})" 
                            class="text-red-600 hover:text-red-800 text-sm">
                        Remove
                    </button>
                </div>
            </div>
        `;
        
        return item;
    }

    function getFileTypeIcon(fileType) {
        const icons = {
            image: `<svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>`,
            video: `<svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>`,
            audio: `<svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
            </svg>`
        };
        return icons[fileType] || icons.image;
    }

    function previewMedia(mediaId, fileType) {
        // Get presigned download URL and open in new tab
        s3MediaUploader.getDownloadUrl(mediaId)
            .then(result => {
                if (result.success) {
                    window.open(result.download_url, '_blank');
                } else {
                    showNotificationToast('❌ Failed to get preview URL: ' + result.error, 'error');
                }
            })
            .catch(error => {
                showNotificationToast('❌ Preview error: ' + error.message, 'error');
            });
    }

    function removeMedia(mediaId) {
        showConfirmationModal(
            'Remove Media File',
            'Are you sure you want to remove this media file?',
            'Remove',
            'Cancel'
        ).then(function(confirmed) {
            if (confirmed) {
                // Remove from uploaded files list
                uploadedFiles = uploadedFiles.filter(file => file.media_id !== mediaId);
                
                // Remove from UI
                const item = document.querySelector(`[data-media-id="${mediaId}"]`);
                if (item) {
                    item.remove();
                }
                
                // Delete from S3
                s3MediaUploader.deleteMedia(mediaId)
                    .then(result => {
                        if (result.success) {
                            console.log('Media deleted successfully');
                        } else {
                            console.error('Failed to delete media:', result.error);
                        }
                    })
                    .catch(error => {
                        console.error('Delete error:', error);
                    });
            }
        });
    }

    function getUploadedMediaIds() {
        return uploadedFiles.map(file => file.media_id);
    }

    // Attach media to letter when form is submitted
    function attachMediaToLetter(letterId) {
        const mediaIds = getUploadedMediaIds();
        if (mediaIds.length === 0) {
            return Promise.resolve();
        }

        return fetch('/attach-media-to-letter', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            credentials: 'include',
            body: JSON.stringify({
                letter_id: letterId,
                media_ids: mediaIds
            })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                console.log(`✅ Attached ${result.attached_count} media files to letter`);
                return result;
            } else {
                throw new Error(result.error);
            }
        });
    }
</script>

{% extends "base.html" %}
{% block title %}Set New Password | LetterForLater{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-surface-container-lowest rounded-[3rem] border border-surface-container-highest p-10 md:p-12 shadow-2xl relative overflow-hidden">
            <!-- Decorative element -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-2xl"></div>
            
            <div class="relative">
                <div class="text-center mb-10">
                    <div class="w-20 h-20 rounded-[2rem] bg-primary/10 flex items-center justify-center text-primary mx-auto mb-8 shadow-inner">
                        <span class="material-symbols-outlined text-4xl">lock_reset</span>
                    </div>
                    <h1 class="font-headline text-3xl font-bold text-on-surface mb-4">New Password</h1>
                    <p class="text-on-surface-variant leading-relaxed">Choose a secure password to protect your digital legacy.</p>
                </div>
                
                <form method="POST" class="space-y-8">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <input type="hidden" name="token" value="{{ token }}">
                    
                    <div class="space-y-6">
                        <div>
                            <label for="password1" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-4">New Password</label>
                            <input type="password" 
                                   class="w-full px-6 py-4 bg-surface-container border border-surface-container-highest rounded-2xl focus:border-primary text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" 
                                   id="password1" 
                                   name="password1" 
                                   required 
                                   placeholder="Min. 7 characters" 
                                   minlength="7">
                        </div>
                        
                        <div>
                            <label for="password2" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-4">Confirm Password</label>
                            <input type="password" 
                                   class="w-full px-6 py-4 bg-surface-container border border-surface-container-highest rounded-2xl focus:border-primary text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" 
                                   id="password2" 
                                   name="password2" 
                                   required 
                                   placeholder="Repeat password" 
                                   minlength="7">
                        </div>
                    </div>
                    
                    <div class="pt-4">
                        <button type="submit" 
                                class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold uppercase tracking-widest text-xs py-5 rounded-2xl shadow-xl shadow-primary/20 transition-all group">
                            <span class="flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-y-[-2px]">verified</span>
                                Reset Password
                            </span>
                        </button>
                    </div>
                    
                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" 
                           class="inline-flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-[10px] font-bold uppercase tracking-widest group">
                            <span class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
                            Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;
    
    if (password1 !== password2) {
        e.preventDefault();
        if (window.showNotificationToast) {
            showNotificationToast('❌ Passwords do not match!', 'error');
        } else {
            alert('Passwords do not match!');
        }
        document.getElementById('password2').focus();
        return false;
    }
    
    if (password1.length < 7) {
        e.preventDefault();
        if (window.showNotificationToast) {
            showNotificationToast('❌ Password must be at least 7 characters long!', 'error');
        } else {
            alert('Password must be at least 7 characters long!');
        }
        document.getElementById('password1').focus();
        return false;
    }
});
</script>
{% endblock %}

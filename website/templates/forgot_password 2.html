{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-primary-light/20 rounded-full p-4 mx-auto mb-4 flex items-center justify-center shadow-lg border-2 border-primary-light">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <circle cx="12" cy="16" r="1"></circle>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-primary mb-2">Forgot Your Password?</h1>
                <p class="text-gray-600">No worries! Enter your email address and we'll send you a link to reset your password.</p>
            </div>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-lg font-semibold text-primary mb-2">Email Address</label>
                    <input type="email" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg" 
                           id="email" 
                           name="email" 
                           required 
                           placeholder="Enter your email address">
                </div>
                
                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg text-lg transition-colors">
                    <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Send Reset Link
                </button>
                
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" 
                       class="text-gray-600 hover:text-primary transition-colors font-medium inline-flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
